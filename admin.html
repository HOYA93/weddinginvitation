<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청첩장 사진 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f5efe6;
      color: #4a3b2a;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
    }

    .card {
      background: #fffaf3;
      border: 1px solid rgba(214,185,140,0.5);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 18px rgba(74,59,42,0.08);
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      height: 46px;
      border: 1px solid #d6b98c;
      border-radius: 12px;
      padding: 0 12px;
      background: white;
      color: #4a3b2a;
      font-size: 15px;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #d6b98c;
      color: #4a3b2a;
      padding: 12px 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #cba978;
    }

    .danger {
      background: #c46d5e;
      color: white;
    }

    .danger:hover {
      background: #b65d4e;
    }

    .row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(74,59,42,0.12);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
      background: #eee;
    }

    .meta {
      font-size: 14px;
      line-height: 1.7;
    }

    .meta b {
      color: #b88f59;
    }

    .notice {
      font-size: 14px;
      line-height: 1.7;
      opacity: 0.75;
    }

    .status {
      margin-top: 12px;
      font-weight: bold;
      color: #b88f59;
    }

    @media (max-width: 560px) {
      .wrap { padding: 16px; }
      .row {
        grid-template-columns: 1fr;
      }
      .row img {
        width: 100%;
        height: 180px;
      }
    }

input[type="file"] {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  line-height: 1.4;
}

input[type="file"]::file-selector-button {
  height: 30px;
  margin-right: 10px;
  padding: 0 12px;
  border: 0;
  border-radius: 8px;
  background: #efe6d8;
  color: #4a3b2a;
  font-weight: 700;
  cursor: pointer;
}

input[type="file"]::file-selector-button:hover {
  background: #d6b98c;
}

.tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 16px 0 18px;
}

.tab {
  border-radius: 999px;
  background: #efe6d8;
  color: #4a3b2a;
  padding: 10px 8px;
  font-size: 14px;
}

.tab.active {
  background: #d6b98c;
  font-weight: 800;
}

.empty {
  padding: 24px 0;
  text-align: center;
  color: rgba(74, 59, 42, 0.65);
}

.order-input {
  width: 90px;
  height: 34px;
  margin-left: 6px;
  padding: 0 8px;
  border-radius: 8px;
}

.action-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (max-width: 560px) {
  .action-buttons {
    flex-direction: row;
  }
}    
    
  </style>
</head>
<body>
  <div class="wrap">
    <h1>청첩장 사진 관리자</h1>

    <div class="card">
      <p class="notice">
        사진 구분을 선택하고 이미지를 업로드하면 청첩장에 사용할 사진 목록에 저장됩니다.<br />
        메인 사진은 section을 <b>main</b>, 갤러리는 <b>gallery</b>, 안내 사진은 <b>info</b>, 지도 이미지는 <b>map</b>으로 저장하세요.
      </p>

      <label>사진 구분</label>
      <select id="section">
        <option value="main">메인 사진</option>
        <option value="profile">신랑신부 프로필</option>
        <option value="story">스토리</option>
        <option value="gallery">갤러리</option>
        <option value="info">예식장 안내</option>
        <option value="map">지도/약도</option>
      </select>

      <label>제목</label>
      <input id="title" placeholder="예: 메인, 갤러리 1, 안내 1" />

      <label>표시 순서</label>
      <input id="sortOrder" type="number" value="1" min="1" />

      <label>사진 파일</label>
      <input id="file" type="file" accept="image/*" />

      <div style="margin-top:16px;">
        <button onclick="uploadImage()">사진 업로드</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="card">
  <h2>등록된 사진</h2>

  <div class="tabs">
    <button class="tab active" data-section="main" onclick="changeImageTab('main')">메인</button>
     <button class="tab" data-section="profile" onclick="changeImageTab('profile')">프로필</button>
    <button class="tab" data-section="story" onclick="changeImageTab('story')">스토리</button>
    <button class="tab" data-section="gallery" onclick="changeImageTab('gallery')">갤러리</button>
    <button class="tab" data-section="info" onclick="changeImageTab('info')">안내</button>
    <button class="tab" data-section="map" onclick="changeImageTab('map')">지도</button>
  </div>

  <div id="imageList"></div>
</div>

  <script>
    const SUPABASE_URL = 'https://mqflxbgcclguhojnrecu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZmx4YmdjY2xndWhvam5yZWN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTU5MDMsImV4cCI6MjA5NTg3MTkwM30.71aaNPBUmzfaxdawQ23zauxrnFIDfMsicCc-ebB8Htk';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentImageTab = 'main';
    let cachedImages = [];

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function changeImageTab(section) {
  currentImageTab = section;

  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.section === section);
  });

  renderImageList();
}

    function getFileExt(fileName) {
  const parts = fileName.split('.');
  return parts.length > 1 ? parts.pop().toLowerCase() : 'jpg';
}

function makeStoragePath(section, file) {
  const ext = getFileExt(file.name);
  const safeSection = section.replace(/[^a-zA-Z0-9_-]/g, '') || 'image';
  const randomName = Math.random().toString(36).slice(2, 10);
  return `${safeSection}/${Date.now()}_${randomName}.${ext}`;
}

function getNextSortOrder(items, section) {
  const used = items
    .filter(item => item.section === section)
    .map(item => Number(item.sort_order || 0))
    .filter(num => num > 0);

  let next = 1;

  while (used.includes(next)) {
    next++;
  }

  return next;
}

async function setNextSortOrderBySection() {
  const section = document.getElementById('section').value;

  const { data, error } = await db
    .from('wedding_images')
    .select('section, sort_order')
    .eq('section', section);

  if (error) {
    console.error(error);
    setStatus('표시 순서 계산 실패: ' + error.message);
    return;
  }

  const nextOrder = getNextSortOrder(data || [], section);
  document.getElementById('sortOrder').value = nextOrder;
}
    
    async function uploadImage() {
  try {
    const section = document.getElementById('section').value;
    const title = document.getElementById('title').value.trim();
    const sortOrder = Number(document.getElementById('sortOrder').value || 1);
    const fileInput = document.getElementById('file');
    const file = fileInput.files[0];

    if (!file) {
      alert('사진 파일을 선택해 주세요.');
      return;
    }

    setStatus('업로드 중...');

    console.log('선택 파일:', file.name, file.type, file.size);
    console.log('section:', section);

    const fileName = makeStoragePath(section, file);

    const duplicatedOrder = cachedImages.find(item =>
  item.section === section &&
  Number(item.sort_order || 0) === sortOrder
);

if (duplicatedOrder) {
  setStatus('');
  alert(
    `[${section}] 구분에 이미 ${sortOrder}번 순서가 있습니다.\n` +
    `다른 순서를 선택해 주세요.`
  );
  return;
}

    console.log('Storage path:', fileName);

    const uploadPromise = db.storage
      .from('wedding-images')
      .upload(fileName, file, {
        cacheControl: '3600',
        upsert: false,
        contentType: file.type || 'image/jpeg'
      });

    const timeoutPromise = new Promise((_, reject) => {
      setTimeout(() => reject(new Error('업로드 시간이 너무 오래 걸립니다. 네트워크 또는 Storage 권한을 확인해 주세요.')), 20000);
    });

    const { error: uploadError } = await Promise.race([
      uploadPromise,
      timeoutPromise
    ]);

    if (uploadError) {
      console.error('uploadError:', uploadError);
      setStatus('업로드 실패: ' + uploadError.message);
      return;
    }

    setStatus('Storage 업로드 완료. DB 저장 중...');

    const { data: publicData } = db.storage
      .from('wedding-images')
      .getPublicUrl(fileName);

    const imageUrl = publicData.publicUrl;

    console.log('publicUrl:', imageUrl);

    const { error: insertError } = await db
      .from('wedding_images')
      .insert({
        section: section,
        title: title,
        image_url: imageUrl,
        file_path: fileName,
        sort_order: sortOrder
      });

    if (insertError) {
      console.error('insertError:', insertError);
      setStatus('DB 저장 실패: ' + insertError.message);
      return;
    }

    setStatus('사진이 업로드되었습니다.');

document.getElementById('title').value = '';
fileInput.value = '';

await loadImages();
await setNextSortOrderBySection();
  } catch (err) {
    console.error('uploadImage error:', err);
    setStatus('오류: ' + err.message);
  }
}

    async function loadImages() {
  const { data, error } = await db
    .from('wedding_images')
    .select('*')
    .order('section', { ascending: true })
    .order('sort_order', { ascending: true })
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    setStatus('목록 불러오기 실패: ' + error.message);
    return [];
  }

  cachedImages = data || [];
  renderImageList();

  return cachedImages;
}

function renderImageList() {
  const list = document.getElementById('imageList');
  const filtered = cachedImages
    .filter(item => item.section === currentImageTab)
    .sort((a, b) => {
      const orderA = Number(a.sort_order || 0);
      const orderB = Number(b.sort_order || 0);

      if (orderA !== orderB) return orderA - orderB;

      return new Date(b.created_at) - new Date(a.created_at);
    });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">이 구분에 등록된 사진이 없습니다.</div>`;
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="row">
      <img src="${item.image_url}" alt="${item.title || ''}" />
      <div class="meta">
        <div><b>구분:</b> ${item.section}</div>
        <div><b>제목:</b> ${item.title || '-'}</div>
        <div>
  <b>순서:</b>
  <input 
    class="order-input"
    id="order-${item.id}"
    type="number"
    min="1"
    value="${item.sort_order ?? 1}"
  />
</div>
        <div><b>경로:</b> ${item.file_path}</div>
      </div>
      <div class="action-buttons">
  <button onclick="updateImageOrder('${item.id}')">순서 저장</button>
  <button class="danger" onclick="deleteImage('${item.id}', '${item.file_path}')">삭제</button>
</div>
    </div>
  `).join('');
}

    async function updateImageOrder(id) {
  const input = document.getElementById(`order-${id}`);
  const newOrder = Number(input.value || 1);

  if (newOrder < 1) {
    alert('표시 순서는 1 이상이어야 합니다.');
    input.value = 1;
    return;
  }

  setStatus('순서 저장 중...');

  const { error } = await db
    .from('wedding_images')
    .update({ sort_order: newOrder })
    .eq('id', id);

  if (error) {
    console.error(error);
    setStatus('순서 저장 실패: ' + error.message);
    return;
  }

  setStatus('순서가 변경되었습니다.');

  await loadImages();
  await setNextSortOrderBySection();
}
    
    async function updateImageOrder(id) {
  const target = cachedImages.find(item => item.id === id);
  if (!target) {
    setStatus('대상 사진을 찾을 수 없습니다.');
    return;
  }

  const input = document.getElementById(`order-${id}`);
  const newOrder = Number(input.value || 1);

  if (newOrder < 1) {
    alert('표시 순서는 1 이상이어야 합니다.');
    input.value = target.sort_order || 1;
    return;
  }

  const duplicated = cachedImages.find(item =>
    item.id !== id &&
    item.section === target.section &&
    Number(item.sort_order || 0) === newOrder
  );

  if (duplicated) {
    alert(
      `[${target.section}] 구분에 이미 ${newOrder}번 순서가 있습니다.\n` +
      `기존 사진: ${duplicated.title || duplicated.file_path}`
    );

    input.value = target.sort_order || 1;
    return;
  }

  setStatus('순서 저장 중...');

  const { error } = await db
    .from('wedding_images')
    .update({ sort_order: newOrder })
    .eq('id', id);

  if (error) {
    console.error(error);
    setStatus('순서 저장 실패: ' + error.message);
    return;
  }

  setStatus('순서가 변경되었습니다.');

  await loadImages();
  await setNextSortOrderBySection();
}

   loadImages();
setNextSortOrderBySection();

document.getElementById('section').addEventListener('change', () => {
  setNextSortOrderBySection();
});
  </script>
</body>
</html>
